name: Complete CI/CD Pipeline with Docker

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint
        continue-on-error: false

      - name: Run Tests
        run: npm test
        continue-on-error: false

      - name: Security Scan
        run: npm audit --audit-level=high
        continue-on-error: false


  sonarcloud-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci-checks

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=sharief708
            -Dsonar.projectKey=sharief708_devops-task
            -Dsonar.projectName=devops-task
            -Dsonar.sources=.
            -Dsonar.coverage.exclusions=**/*.test.js,**/*.spec.js


  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [ci-checks, sonarcloud-analysis]

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/login-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment Info
        run: |
          echo "Docker image built and pushed successfully!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo "SHA: ${{ github.sha }}"
          echo ""
          echo "To run this image:"
          echo "docker pull ${{ secrets.DOCKER_USERNAME }}/login-api:latest"
          echo "docker run -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/login-api:latest"